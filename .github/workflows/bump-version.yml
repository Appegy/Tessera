# Manual version bump: sets the package version in every place it lives and commits to the
# branch it runs on. Run it after a release to set the next version (model A: release.yml
# tags whatever version is currently in src/package.json).
# The commit is authored by whoever triggers the workflow.

name: Bump version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New package version, e.g. 1.0.1 or 1.1.0-pre.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump:
    name: Set version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate version (semver)
        run: |
          echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$' \
            || { echo "::error::'${{ inputs.version }}' is not a valid semver"; exit 1; }

      - name: Apply version everywhere
        env:
          V: ${{ inputs.version }}
        run: |
          # 1) package manifest (source of truth the release reads)
          jq --arg v "$V" '.version = $v' src/package.json > src/package.json.tmp
          mv src/package.json.tmp src/package.json
          # 2) PackageInfo.cs constant
          sed -i -E "s/(public const string Version = \")[^\"]*(\";)/\1$V\2/" src/Runtime/PackageInfo.cs
          # 3) dev/demo project version (kept in step with the package)
          sed -i -E "s/^(  bundleVersion: ).*/\1$V/" "Appegy.Tessera.Lab/ProjectSettings/ProjectSettings.asset"
          echo "Set version to $V in:"; git diff --name-only

      - name: Commit and push (authored by whoever ran this)
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          if git diff --quiet; then
            echo "Already at ${{ inputs.version }} - nothing to commit."
            exit 0
          fi
          git add -A
          git commit -m "Set version to ${{ inputs.version }}"
          git push
