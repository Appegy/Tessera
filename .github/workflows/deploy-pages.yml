# Per-PR WebGL preview environments on GitHub Pages.
#
# One build-agnostic shell (tools/pages-shell/index.html) lives at the root of the
# `demo` branch. Each PR (and main) is published as a HEADLESS build under
# demo/<slug>/ (Build/* + build.json, no per-build index.html); the shell reads
# previews.json, shows a dropdown, and loads the chosen build into its canvas.
#   slug = "main" for main, "pr-<N>" for pull requests.
#   The shell selects a build via the URL hash (/#b=<slug>); main is the clean root.
#
# Lifecycle:
#   PR opened/reopened/synchronize -> build PR head -> publish demo/pr-<N>/
#   push to main                   -> build main    -> publish demo/main/
#   PR closed (merged or not)      -> remove demo/pr-<N>/
# A new push to a PR cancels its in-flight build (per-target concurrency); writes to
# demo are serialized (tessera-demo-write) and squashed to one orphan commit.
#
# NOTE: pull_request runs use the workflow file from the PR HEAD branch, so a PR
# auto-previews as soon as its branch carries this workflow.
#
# Secrets (repo-level): UNITY_LICENSE (Personal .ulf contents), UNITY_EMAIL, UNITY_PASSWORD.

name: WebGL PR previews

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Appegy.Tessera.Environment~/**'
      - 'Runtime/**'
      - '.github/workflows/deploy-pages.yml'
      - 'tools/pages-shell/**'
      - 'tools/demo-publish.sh'
      - 'tools/demo-cleanup.sh'
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write

jobs:
  build:
    name: Build WebGL
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: tessera-build-${{ github.event.pull_request.number || github.ref_name }}
      cancel-in-progress: true
    outputs:
      slug: ${{ steps.id.outputs.slug }}
      branch: ${{ steps.id.outputs.branch }}
      pr: ${{ steps.id.outputs.pr }}
      title: ${{ steps.id.outputs.title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Identify preview (slug / branch / pr / title)
        id: id
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$PR_NUM" ]; then
            SLUG="pr-$PR_NUM"; BRANCH="$HEAD_REF"; PR="$PR_NUM"; TITLE="$PR_TITLE"
          elif [ "$REF_NAME" = "main" ]; then
            SLUG="main"; BRANCH="main"; PR=""; TITLE="main"
          else
            SLUG="$(printf '%s' "$REF_NAME" | sed 's#[^A-Za-z0-9._-]#-#g')"; BRANCH="$REF_NAME"; PR=""; TITLE="$REF_NAME"
          fi
          echo "Building $BRANCH -> /$SLUG/"
          echo "slug=$SLUG"     >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "pr=$PR"         >> "$GITHUB_OUTPUT"
          { echo "title<<__TESSERA_EOF__"; echo "$TITLE"; echo "__TESSERA_EOF__"; } >> "$GITHUB_OUTPUT"

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Appegy.Tessera.Environment~/Library
          key: Library-WebGL-${{ hashFiles('Appegy.Tessera.Environment~/Assets/**', 'Appegy.Tessera.Environment~/Packages/**', 'Appegy.Tessera.Environment~/ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Free disk space for the Unity editor image
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup
          df -h /

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Appegy.Tessera.Environment~
          unityVersion: 6000.4.8f1
          targetPlatform: WebGL
          buildName: Tessera
          allowDirtyBuild: true

      - name: Normalize build output
        run: |
          sudo chown -R "$(id -u):$(id -g)" build || true
          INDEX="$(find build -name index.html | head -1)"
          if [ -z "$INDEX" ]; then echo "No index.html under build/:"; find build -maxdepth 4 || true; exit 1; fi
          SRC="$(dirname "$INDEX")"
          echo "WebGL build at: $SRC"
          rm -rf out && mkdir -p out
          cp -r "$SRC"/. out/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgl-${{ steps.id.outputs.slug }}
          path: out
          retention-days: 1

  publish:
    name: Publish preview to demo
    needs: build
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: tessera-demo-write
      cancel-in-progress: false
    steps:
      - name: Checkout (shell + scripts)
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webgl-${{ needs.build.outputs.slug }}
          path: artifact

      - name: Publish to demo branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ needs.build.outputs.slug }}
          BRANCH: ${{ needs.build.outputs.branch }}
          PR: ${{ needs.build.outputs.pr }}
          TITLE: ${{ needs.build.outputs.title }}
        run: |
          chmod +x tools/demo-publish.sh
          tools/demo-publish.sh

  cleanup:
    name: Remove preview from demo
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: tessera-demo-write
      cancel-in-progress: false
    steps:
      - name: Checkout (scripts)
        uses: actions/checkout@v4

      - name: Remove from demo branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: pr-${{ github.event.pull_request.number }}
        run: |
          chmod +x tools/demo-cleanup.sh
          tools/demo-cleanup.sh
