# Per-branch WebGL preview environments on GitHub Pages.
#
# Every PR (and main) is built with game-ci and published into the `demo` branch
# under /<slug>/, where slug = branch name with non-[A-Za-z0-9._-] replaced by '-'.
# GitHub Pages serves demo, so each branch is live at
#   https://appegy.github.io/Tessera/<slug>/
# The site root redirects to /main/, and each build's template carries a branch
# switcher populated from /branches.json (see tools/pages-shell + the WebGL template).
#
# Lifecycle:
#   PR opened/reopened/synchronize -> build that branch -> publish /<slug>/
#   push to main                   -> build main        -> publish /main/
#   PR closed (merged or not)      -> remove /<slug>/
# A new push to an open PR cancels its in-flight build (per-branch concurrency);
# writes to demo are serialized (tessera-demo-write) and squashed to one orphan
# commit so the branch never accumulates 32MB build blobs.
#
# NOTE: pull_request-triggered runs use the workflow file from the BASE branch, so
# the PR auto-triggers only take effect once this file is on main. Until then the
# build/publish path can be exercised with workflow_dispatch on a feature branch.
#
# Secrets (repo-level): UNITY_LICENSE (Personal .ulf contents), UNITY_EMAIL, UNITY_PASSWORD.

name: WebGL PR previews

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Appegy.Tessera.Environment~/**'
      - 'Runtime/**'
      - '.github/workflows/deploy-pages.yml'
      - 'tools/pages-shell/**'
      - 'tools/demo-publish.sh'
      - 'tools/demo-cleanup.sh'
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write

jobs:
  build:
    name: Build WebGL
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: tessera-build-${{ github.event.pull_request.head.ref || github.ref_name }}
      cancel-in-progress: true
    outputs:
      slug: ${{ steps.id.outputs.slug }}
      branch: ${{ steps.id.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Identify branch + slug
        id: id
        run: |
          BRANCH="${{ github.event.pull_request.head.ref || github.ref_name }}"
          SLUG="$(printf '%s' "$BRANCH" | sed 's#[^A-Za-z0-9._-]#-#g')"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG"     >> "$GITHUB_OUTPUT"
          echo "Building $BRANCH -> /$SLUG/"

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Appegy.Tessera.Environment~/Library
          key: Library-WebGL-${{ hashFiles('Appegy.Tessera.Environment~/Assets/**', 'Appegy.Tessera.Environment~/Packages/**', 'Appegy.Tessera.Environment~/ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Free disk space for the Unity editor image
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup
          df -h /

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Appegy.Tessera.Environment~
          unityVersion: 6000.4.8f1
          targetPlatform: WebGL
          buildName: Tessera
          allowDirtyBuild: true

      - name: Normalize build output
        run: |
          sudo chown -R "$(id -u):$(id -g)" build || true
          INDEX="$(find build -name index.html | head -1)"
          if [ -z "$INDEX" ]; then
            echo "No index.html under build/:"; find build -maxdepth 4 || true; exit 1
          fi
          SRC="$(dirname "$INDEX")"
          echo "WebGL build at: $SRC"
          rm -rf out && mkdir -p out
          cp -r "$SRC"/. out/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgl-${{ steps.id.outputs.slug }}
          path: out
          retention-days: 1

  publish:
    name: Publish preview to demo
    needs: build
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: tessera-demo-write
      cancel-in-progress: false
    steps:
      - name: Checkout (shell + scripts)
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webgl-${{ needs.build.outputs.slug }}
          path: artifact

      - name: Publish to demo branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ needs.build.outputs.slug }}
          BRANCH: ${{ needs.build.outputs.branch }}
        run: |
          chmod +x tools/demo-publish.sh
          tools/demo-publish.sh

  cleanup:
    name: Remove preview from demo
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: tessera-demo-write
      cancel-in-progress: false
    steps:
      - name: Checkout (scripts)
        uses: actions/checkout@v4

      - name: Identify slug
        id: id
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          SLUG="$(printf '%s' "$BRANCH" | sed 's#[^A-Za-z0-9._-]#-#g')"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "Removing preview for $BRANCH -> /$SLUG/"

      - name: Remove from demo branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ steps.id.outputs.slug }}
        run: |
          chmod +x tools/demo-cleanup.sh
          tools/demo-cleanup.sh
