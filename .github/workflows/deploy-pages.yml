# Builds the Tessera playground scene to WebGL with game-ci and publishes it to
# GitHub Pages (artifact + deploy-pages flow, no branch touched).
#
# Prerequisites (one-time):
#   - Repo Settings -> Pages -> Source = "GitHub Actions" (already set).
#   - Secrets: UNITY_EMAIL, UNITY_PASSWORD (Unity Personal account, 2FA off).
#
# CI builds with Unity 6000.4.8f1 (newest game-ci WebGL image in the 6000.4 line);
# the project is authored in 6000.4.10f1 but same-minor patch builds are compatible.

name: Deploy playground to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main, ivan/web-demo]
    paths:
      - 'Appegy.Tessera.Environment~/**'
      - 'Runtime/**'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Appegy.Tessera.Environment~/Library
          key: Library-WebGL-${{ hashFiles('Appegy.Tessera.Environment~/Assets/**', 'Appegy.Tessera.Environment~/Packages/**', 'Appegy.Tessera.Environment~/ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Appegy.Tessera.Environment~
          unityVersion: 6000.4.8f1
          targetPlatform: WebGL
          buildName: Tessera
          allowDirtyBuild: true

      - name: Stage site
        run: |
          set -e
          sudo chown -R "$(id -u):$(id -g)" build || true
          INDEX=$(find build -name index.html | head -1)
          if [ -z "$INDEX" ]; then
            echo "No index.html found under build/:"
            find build -maxdepth 4 || true
            exit 1
          fi
          SITE_DIR=$(dirname "$INDEX")
          echo "WebGL build found at: $SITE_DIR"
          mkdir -p _site
          cp -r "$SITE_DIR"/. _site/
          ls -la _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
