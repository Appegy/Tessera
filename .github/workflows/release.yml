# Manual release: packs the package in src/ into a .tgz and publishes it as a GitHub Release.
# Version comes from src/package.json (model A) - bump it first (see bump-version.yml) to cut a new one.
#
# UNSIGNED for now: uses `npm pack` to produce the tarball (same artifact OpenUPM would build).
# To sign later: replace the "Pack tarball" step with the Unity UPM CLI:
#     curl -fsSL https://cdn.packages.unity.com/upm-cli/install.sh | bash
#     upm pack pack --organization-id "$UPM_ORG_ID" --destination out
#   (env: UPM_SERVICE_ACCOUNT_KEY_ID / UPM_SERVICE_ACCOUNT_KEY_SECRET; the signed .tgz
#    carries package/.attestation.p7m). The stage/tag/release steps stay the same.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Pack and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: pkg
        run: |
          VERSION="$(jq -r .version src/package.json)"
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "No version found in src/package.json"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          # A '-' in the semver (e.g. 1.2.0-pre.1) marks a prerelease.
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Releasing v$VERSION"

      - name: Ensure tag does not already exist
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.pkg.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.pkg.outputs.tag }} already exists - bump the version before releasing."
            exit 1
          fi

      - name: Stage package contents
        run: |
          rm -rf pack && mkdir -p pack out
          cp -R src/. pack/
          # README/LICENSE/CHANGELOG live at the repo root - fold them into the package
          # so the published tarball is complete.
          for f in README.md LICENSE CHANGELOG.md; do
            [ -f "$f" ] && cp "$f" pack/
          done

      - name: Pack tarball (unsigned)
        id: pack
        run: |
          TGZ="$(cd pack && npm pack --silent --pack-destination ../out)"
          echo "tgz=out/$TGZ" >> "$GITHUB_OUTPUT"
          echo "Packed out/$TGZ - contents:"
          tar -tzf "out/$TGZ"

      - name: Create and push tag
        run: |
          git tag "${{ steps.pkg.outputs.tag }}"
          git push origin "${{ steps.pkg.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FLAGS=()
          [ "${{ steps.pkg.outputs.prerelease }}" = "true" ] && FLAGS+=(--prerelease)
          gh release create "${{ steps.pkg.outputs.tag }}" "${{ steps.pack.outputs.tgz }}" \
            --title "${{ steps.pkg.outputs.tag }}" \
            --notes "Automated release of ${{ steps.pkg.outputs.tag }}." \
            "${FLAGS[@]}"
