# Runs the package's EditMode tests on every pull request via game-ci, so a PR
# cannot merge with failing tests. Mirrors the setup used in Appegy/BinaryPrefs.
#
# Secrets (repo-level): UNITY_LICENSE (Personal .ulf contents), UNITY_EMAIL, UNITY_PASSWORD.
# Uses the same Unity 6000.4.8f1 game-ci image as the WebGL build; the project is
# authored in 6000.4.10f1 (same-minor patch builds are compatible).

name: Tests

on: [pull_request, workflow_dispatch]

jobs:
  test:
    name: EditMode tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Tests-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Tests-
            Library-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.4.8f1
          testMode: EditMode

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ${{ steps.tests.outputs.artifactsPath }}
